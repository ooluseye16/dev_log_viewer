name: dev_log_client
description: Flutter/Dart client for dev_log_viewer. Forwards logs to the local viewer with a Dio interceptor, AppLog shortcuts, and raw log sender.
version: 0.1.0
repository: https://github.com/ooluseye16/dev_log_viewer
issue_tracker: https://github.com/ooluseye16/dev_log_viewer/issues

topics:
  - logging
  - debug
  - developer-tools
  - dio
  - flutter

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dio: ^5.0.0

dev_dependencies:
  lints: ^6.0.0
